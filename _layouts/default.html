<head>

      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-CN7DQWY40N');
    </script>

    <!-- ==========================================
         Theme Check Preflight (Prevents FOUC)
         ========================================== -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- ==========================================
         Fonts & Icons
         ========================================== -->

    <!-- ==========================================
         Tailwind CSS Configuration
         ========================================== -->

        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        navy: '#1c2431',
                        orange: '#fb923c',
                        surface: '#1e293b',

                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- ==========================================
         Custom CSS (Cursor & Utilities)
         ========================================== -->
    <style>
        body { -webkit-font-smoothing: antialiased; }
        .img-zoom-container { overflow: hidden; }
        .img-zoom-container img { transition: transform 0.7s ease, filter 0.7s ease; }
        .img-zoom-container:hover img { transform: scale(1.05); filter: grayscale(0); }
        .custom-cursor { position: fixed; top: 0; left: 0; width: 150px; height: 150px; background: radial-gradient(circle, rgba(251, 146, 60, 0.15) 0%, transparent 60%); pointer-events: none; z-index: 0; transform: translate(-50%, -50%); transition: width 0.5s ease, height 0.5s ease, opacity 0.3s ease; will-change: transform, width, height; opacity: 0; }
        .custom-cursor.active-project { width: 200px; height: 200px; background: radial-gradient(circle, rgba(251, 146, 60, 0.25) 0%, transparent 60%); }
        .menu-gradient-track { background-image: radial-gradient(circle 100px at var(--mouse-x, 50%) var(--mouse-y, 50%), #fcd34d 0%, #fb923c 40%, #ea580c 100%); -webkit-background-clip: text; background-clip: text; background-repeat: no-repeat; }
        .bg-gradient-track { background-image: radial-gradient(circle 150px at var(--mouse-x, 50%) var(--mouse-y, 50%), #fcd34d 0%, #fb923c 40%, #ea580c 100%); }
        @keyframes float-abstract-1 { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); } 50% { transform: translateY(-20px) rotate(5deg) scale(1.05); } }
        @keyframes float-abstract-2 { 0%, 100% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(-15px, 20px) scale(1.15); } }
        .animate-abstract-1 { animation: float-abstract-1 8s ease-in-out infinite; }
        .animate-abstract-2 { animation: float-abstract-2 6s ease-in-out infinite; }
        .reveal-up { animation: revealUpAnim 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes revealUpAnim { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .anti-flicker { -webkit-backface-visibility: hidden; backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0); }
        .tool-logo { height: 38px; width: auto; max-width: 140px; object-fit: contain; will-change: transform; }
        @media (min-width: 768px) { .tool-logo { height: 46px; max-width: 180px; } }
         /* Floating Back to Top States */
        #back-to-top { 
            opacity: 0; 
            pointer-events: none; 
            transform: translateY(2rem); 
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        #back-to-top.visible { 
            opacity: 1; 
            pointer-events: auto; 
            transform: translateY(0); 
        }
    </style>
</head>

    <!-- ==========================================
         Unified Scripts (Framer Motion & Global UI Logic)
         ========================================== -->
    <script type="module">
        import { animate, stagger, inView } from "https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm";

        document.addEventListener('DOMContentLoaded', () => {

            // 1. Framer Motion: Premium Simple Blur In Title Effect
            const sectionTitles = document.querySelectorAll('.blur-in-title');
            sectionTitles.forEach(title => {
                title.style.opacity = '0';
                title.style.filter = 'blur(12px)';
                title.style.transform = 'translateY(20px)';
                title.style.willChange = 'opacity, filter, transform';

                inView(title, () => {
                    animate(title, { opacity: [0, 1], filter: ["blur(12px)", "blur(0px)"], y: [20, 0] }, { delay: 0.3, duration: 1.4, ease: [0.16, 1, 0.3, 1] });
                    return () => {
                        title.style.opacity = '0';
                        title.style.filter = 'blur(12px)';
                        title.style.transform = 'translateY(20px)';
                    };
                }, { amount: 0.5, once: false });
            });

            // 1.5 Framer Motion: Vertical Divider Line Drop Effect
            const dividerLines = document.querySelectorAll('.js-divider-line');
            dividerLines.forEach(line => {
                inView(line, () => {
                    animate(line, { scaleY: [0, 1], opacity: [0, 1] }, { delay: 0.6, duration: 1.2, ease: [0.16, 1, 0.3, 1] });
                    return () => { line.style.transform = 'scaleY(0)'; line.style.opacity = '0'; };
                }, { amount: 0.5, once: false });
            });

            // 2. Framer Motion: Project Cards Reveal Effect
            inView("#projects", () => {
                animate(".project-card", { opacity: [0, 1], y: [30, 0] }, { delay: stagger(0.15), duration: 1.2, ease: [0.16, 1, 0.3, 1] });
                setTimeout(() => { document.querySelectorAll('.project-card').forEach(card => card.style.transform = ''); }, 1500);
            }, { amount: 0.2 });

            // 3. Fullscreen Menu Overlay Logic
            const menuToggleBtn = document.getElementById('menu-toggle');
            const menuOverlay = document.getElementById('fullscreen-menu');
            const menuLinks = document.querySelectorAll('.menu-link');
            const mainHeader = document.getElementById('main-header');
            const lines = menuToggleBtn.querySelectorAll('span');
            let isMenuOpen = false;

            const toggleMenu = () => {
                isMenuOpen = !isMenuOpen;
                if (isMenuOpen) {
                    lines[0].classList.add('translate-y-[4px]', 'rotate-45');
                    lines[1].classList.remove('w-6');
                    lines[1].classList.add('w-8', '-translate-y-[4px]', '-rotate-45');
                    menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
                    mainHeader.classList.remove('bg-white/70', 'dark:bg-navy/70', 'backdrop-blur-xl', 'border-b');
                    mainHeader.classList.add('bg-transparent', 'dark:bg-transparent');
                    animate(menuLinks, { opacity: [0, 1], y: [40, 0] }, { delay: stagger(0.1, { startDelay: 0.2 }), duration: 0.8, ease: [0.16, 1, 0.3, 1] });
                    document.body.style.overflow = 'hidden'; 
                } else {
                    lines[0].classList.remove('translate-y-[4px]', 'rotate-45');
                    lines[1].classList.remove('w-8', '-translate-y-[4px]', '-rotate-45');
                    lines[1].classList.add('w-6');
                    menuOverlay.classList.add('opacity-0', 'pointer-events-none');
                    mainHeader.classList.add('bg-white/70', 'dark:bg-navy/70', 'backdrop-blur-xl', 'border-b');
                    mainHeader.classList.remove('bg-transparent', 'dark:bg-transparent');
                    animate(menuLinks, { opacity: 0, y: 40 }, { duration: 0 });
                    document.body.style.overflow = ''; 
                }
            };

            menuToggleBtn.addEventListener('click', toggleMenu);
            menuLinks.forEach(link => { link.addEventListener('click', () => { if (isMenuOpen) toggleMenu(); }); });

            // 4. Project Filtering Logic
            const filterBtns = document.querySelectorAll('.filter-btn');
            const projectCards = document.querySelectorAll('.project-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('text-black', 'dark:text-white');
                        b.classList.add('text-slate-500');
                        b.querySelector('.underline-indicator').classList.replace('scale-100', 'scale-0');
                    });
                    btn.classList.add('text-black', 'dark:text-white');
                    btn.classList.remove('text-slate-500');
                    btn.querySelector('.underline-indicator').classList.replace('scale-0', 'scale-100');

                    const filterValue = btn.getAttribute('data-filter');
                    let delayCount = 0;

                    projectCards.forEach(card => {
                        const categories = card.getAttribute('data-category') || '';
                        if (filterValue === 'all' || categories.includes(filterValue)) {
                            card.style.display = 'grid'; 
                            animate(card, { opacity: [0, 1], y: [20, 0] }, { delay: delayCount * 0.1, duration: 0.8, ease: [0.16, 1, 0.3, 1] });
                            delayCount++;
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });

            // 5. Light/Dark Mode Theme Switcher
            const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
            const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
            const themeToggleBtn = document.getElementById('theme-toggle');

            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
            }

            themeToggleBtn.addEventListener('click', function() {
                const colorElements = document.querySelectorAll('.transition-colors');
                colorElements.forEach((el, index) => {
                    const sequentialDelay = (index * 8) % 500;
                    const randomJitter = Math.random() * 100;
                    el.style.transitionDelay = `${sequentialDelay + randomJitter}ms`;
                    el.style.transitionDuration = '200ms';
                });

                themeToggleDarkIcon.classList.toggle('hidden');
                themeToggleLightIcon.classList.toggle('hidden');

                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }

                setTimeout(() => {
                    colorElements.forEach(el => {
                        el.style.transitionDelay = '';
                        el.style.transitionDuration = '';
                    });
                }, 1000);
            });

            // 6. Scroll Animations
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.15 };
            const scrollObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('opacity-0');
                        entry.target.classList.add('reveal-up');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            document.querySelectorAll('.js-scroll-anim').forEach(el => scrollObserver.observe(el));

            // 7. Scroll Progress Bar Indicator
            const progressBar = document.getElementById('scroll-progress');
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                if (docHeight > 0 && progressBar) {
                    progressBar.style.width = ((winScroll / docHeight) * 100) + '%';
                }
            });

            // 8. Custom Cursor Follower Logic
            const customCursor = document.getElementById('custom-cursor');
            if (window.matchMedia("(pointer: fine)").matches && customCursor) {
                let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2, cursorX = mouseX, cursorY = mouseY;

                document.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX; mouseY = e.clientY;
                    customCursor.style.opacity = '1';
                });

                const renderCursor = () => {
                    cursorX += (mouseX - cursorX) * 0.12; cursorY += (mouseY - cursorY) * 0.12;
                    customCursor.style.transform = `translate(calc(${cursorX}px - 50%), calc(${cursorY}px - 50%))`;
                    
                    document.querySelectorAll('.menu-link:hover, .track-hover:hover').forEach(link => {
                        link.querySelectorAll('.menu-gradient-track, .bg-gradient-track').forEach(track => {
                            const rect = track.getBoundingClientRect();
                            track.style.setProperty('--mouse-x', `${cursorX - rect.left}px`);
                            track.style.setProperty('--mouse-y', `${cursorY - rect.top}px`);
                        });
                    });
                    requestAnimationFrame(renderCursor);
                };
                requestAnimationFrame(renderCursor);

                document.querySelectorAll('a, button, .project-card, .filter-btn').forEach(el => {
                    el.addEventListener('mouseenter', () => customCursor.classList.add('active-project'));
                    el.addEventListener('mouseleave', () => customCursor.classList.remove('active-project'));
                });
            } else if (customCursor) {
                customCursor.style.display = 'none'; 
            }

            // 9. Web Share API Integration
            const shareBtns = document.querySelectorAll('.js-share-btn');
            shareBtns.forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault(); e.stopPropagation();
                    const title = btn.getAttribute('data-share-title') || 'Suraj | Portfolio';
                    const text = btn.getAttribute('data-share-text') || 'Check out this portfolio project!';
                    const url = btn.getAttribute('data-share-url') || window.location.href;

                    if (navigator.share) {
                        try { await navigator.share({ title, text, url }); } catch (err) { console.log('Share canceled or failed'); }
                    } else {
                        try {
                            const textArea = document.createElement("textarea");
                            textArea.value = url;
                            document.body.appendChild(textArea);
                            textArea.select();
                            document.execCommand("copy");
                            document.body.removeChild(textArea);
                            
                            const originalHTML = btn.innerHTML;
                            btn.innerHTML = `<span class="text-orange text-[10px] font-bold uppercase tracking-widest leading-none block">Copied!</span>`;
                            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
                        } catch (err) { console.error('Failed to copy', err); }
                    }
                });
            });

            // 10. Back to Top Button
            // Floating Button Logic
            const btt = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btt.classList.add('visible');
                } else {
                    btt.classList.remove('visible');
                }
            });

            btt.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

        });
    </script>
</body>
</html>
